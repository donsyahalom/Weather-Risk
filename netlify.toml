# ================================================================
#  WeatherMyTrip · netlify.toml
#  Drop this file in the root of your repo.
#  Netlify picks it up automatically on every deploy.
# ================================================================

[build]
  # No build step needed — pure static HTML
  publish = "."

# ----------------------------------------------------------------
# Redirect all routes to index.html (SPA-style fallback)
# ----------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ----------------------------------------------------------------
# Security & caching headers
# ----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Never cache the main HTML so deploys propagate immediately
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ================================================================
#  Deploy via:
#    netlify deploy --prod            (CLI)
#    or push to GitHub (auto-deploy if site is connected)
# ================================================================
